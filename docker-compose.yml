name: cpp-devenv

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Match these to your host UID/GID to avoid file permission issues
        # Override via: USER_UID=$(id -u) USER_GID=$(id -g) docker compose up
        USERNAME: dev
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    image: cpp-devenv:latest
    container_name: cpp-dev

    volumes:
      # ── Project source ────────────────────────────────────────────────────
      # Edit on host with your native Neovim, build/debug inside the container
      - type: bind
        source: .
        target: /workspace

      # ── Persist the Nix store (avoids re-downloading packages on restart) ─
      - nix-store:/nix

      # ── ccache across rebuilds ────────────────────────────────────────────
      - ccache:/home/dev/.ccache

      # ── Dotfile passthroughs from host ────────────────────────────────────
      - type: bind
        source: ${HOME}/.gitconfig
        target: /home/dev/.gitconfig
        read_only: true

      - type: bind
        source: ${HOME}/.ssh
        target: /home/dev/.ssh
        read_only: true

      # Optional: mount your Neovim config if you want nvim inside the container
      # too (e.g. for :terminal workflows or remote pair programming)
      # - type: bind
      #   source: ${HOME}/.config/nvim
      #   target: /home/dev/.config/nvim
      #   read_only: true

    environment:
      - CC=clang
      - CXX=clang++
      - LD=lld
      - CCACHE_DIR=/home/dev/.ccache
      - CCACHE_MAXSIZE=5G
      - CMAKE_EXPORT_COMPILE_COMMANDS=ON
      - TERM=${TERM:-xterm-256color}
      - COLORTERM=${COLORTERM:-truecolor}

    # ── Capabilities for debuggers / profilers ────────────────────────────
    cap_add:
      - SYS_PTRACE        # gdb, lldb, strace, ltrace
    security_opt:
      - seccomp=unconfined  # required for rr (record-replay)

    stdin_open: true
    tty: true
    working_dir: /workspace
    command: bash

volumes:
  nix-store:
  ccache:
